<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>JS Events Demo</title>
  <style>
    body { font-family: Arial, sans-serif; padding: 20px; }
    #box, #dragItem, #dropZone {
      width: 150px;
      height: 150px;
      border: 2px solid #333;
      margin: 10px 0;
    }
    #box { background: white; }
    #dragItem { background: lightblue; cursor: grab; }
    #dropZone { background: #eee; }
  </style>
</head>
<body>

  <button id="btn">Click me</button>

  <div id="box">Mouse Area</div>

  <input id="input" placeholder="Type here" />
  <br><br>

  <select id="select">
    <option value="">Select</option>
    <option>A</option>
    <option>B</option>
  </select>

  <form id="form">
    <input placeholder="Form input" />
    <button type="submit">Submit</button>
  </form>

  <div id="dragItem" draggable="true">Drag me</div>
  <div id="dropZone">Drop here</div>

  <script src="script.js"></script>
</body>
</html>
