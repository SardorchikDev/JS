            <div class="cart-section">

                <div class="cart-items" id="cartItems">
                    <p class="empty-cart">Savatcha bo'sh</p>
                </div>
                <div class="cart-total">
                    <span>Umumiy summa:</span>

        <script src="script.js"></script>
